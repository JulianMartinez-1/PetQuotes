# /etc/nginx/sites-available/petquotes
#
# Copy to server:
#   sudo cp nginx/petquotes.conf /etc/nginx/sites-available/petquotes
#   sudo ln -s /etc/nginx/sites-available/petquotes /etc/nginx/sites-enabled/petquotes
#   sudo nginx -t && sudo systemctl reload nginx
#
# After running Certbot, this file will be updated automatically
# with SSL redirect and certificate paths.

# ── Frontend — petquotes.online ───────────────────────────────
server {
    listen 80;
    server_name petquotes.online www.petquotes.online;

    # Max upload size (pet profile images)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}

# ── Backend API — api.petquotes.online ────────────────────────
server {
    listen 80;
    server_name api.petquotes.online;

    # Max upload size (pet profile images sent to API)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }
}
