services:
  # ============================================================
  # Database (PostgreSQL)
  # ============================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: pet_quotes_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pet_quotes}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-pet_quotes_password}
      POSTGRES_DB: ${DATABASE_NAME:-pet_quotes_db}
    ports:
      - "5432:5432"
    volumes:
      - pet_quotes_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pet_quotes} -d ${DATABASE_NAME:-pet_quotes_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pet_quotes_network

  # ============================================================
  # Backend (NestJS)
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pet_quotes_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-pet_quotes}:${DATABASE_PASSWORD:-pet_quotes_password}@postgres-db:5432/${DATABASE_NAME:-pet_quotes_db}
      NODE_ENV: development
      APP_PORT: 3001
      FRONTEND_URL: http://frontend:3000
    ports:
      - "3001:3001"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - /app/node_modules
    networks:
      - pet_quotes_network
    command: npm run start:prod

  # ============================================================
  # Frontend (Next.js)
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pet_quotes_frontend
    env_file:
      - .env
    environment:
      API_BASE_URL: http://backend:3001
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - pet_quotes_network

  # ============================================================
  # PgAdmin (Database Admin UI)
  # ============================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pet_quotes_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      postgres-db:
        condition: service_healthy
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - pet_quotes_network

  # ============================================================
  # Redis (Cache)
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: pet_quotes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet_quotes_network

# ============================================================
# Volumes
# ============================================================
volumes:
  pet_quotes_data:
    driver: local
  pgadmin_data:
    driver: local
  redis_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  pet_quotes_network:
    driver: bridge
