services:
  # ============================================================
  # Database (PostgreSQL)
  # ============================================================
  postgres-db:
    image: postgres:16-alpine
    container_name: pet_quotes_postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DATABASE_USER:-pet_quotes}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-changeme}
      POSTGRES_DB: ${DATABASE_NAME:-pet_quotes_db}
    volumes:
      - pet_quotes_data:/var/lib/postgresql/data
      - ./backend/prisma/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-pet_quotes} -d ${DATABASE_NAME:-pet_quotes_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pet_quotes_network
    restart: unless-stopped

  # ============================================================
  # Backend (NestJS)
  # Nginx forwards api.petquotes.online → 127.0.0.1:3001
  # Bind to localhost only so the port is not publicly reachable.
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: pet_quotes_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${DATABASE_USER:-pet_quotes}:${DATABASE_PASSWORD:-changeme}@postgres-db:5432/${DATABASE_NAME:-pet_quotes_db}
      NODE_ENV: production
      APP_PORT: 3001
      FRONTEND_URL: https://petquotes.online
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pet_quotes_network
    restart: unless-stopped

  # ============================================================
  # Frontend (Next.js)
  # Nginx forwards petquotes.online → 127.0.0.1:3000
  # NEXT_PUBLIC_* vars are baked at build time via build args.
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: https://api.petquotes.online
        NEXT_PUBLIC_API_URL: https://api.petquotes.online
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
        NEXT_PUBLIC_API_TIMEOUT_MS: ${NEXT_PUBLIC_API_TIMEOUT_MS:-10000}
    container_name: pet_quotes_frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_BASE_URL: http://backend:3001
      NEXT_PUBLIC_API_BASE_URL: https://api.petquotes.online
      NEXT_PUBLIC_API_URL: https://api.petquotes.online
      JWT_ACCESS_SECRET: ${JWT_SECRET}
      API_PROXY_TIMEOUT_MS: ${API_PROXY_TIMEOUT_MS:-8000}
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    volumes:
      - pet_uploads:/app/public/uploads/pets
    networks:
      - pet_quotes_network
    restart: unless-stopped

  # ============================================================
  # Analytics Service (Python / FastAPI)
  # No public port — internal Docker network only.
  # All external traffic goes through backend at /api/analytics/*.
  # ============================================================
  analytics-service:
    build:
      context: ./analytics-service
      dockerfile: Dockerfile
    container_name: pet_quotes_analytics
    env_file:
      - .env
    environment:
      ANALYTICS_DB_URL: postgresql://${DATABASE_USER:-pet_quotes}:${DATABASE_PASSWORD:-changeme}@postgres-db:5432/${DATABASE_NAME:-pet_quotes_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      ANALYTICS_PORT: 3009
      LOG_LEVEL: info
    depends_on:
      postgres-db:
        condition: service_healthy
    networks:
      - pet_quotes_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:3009/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis (Cache)
  # No public port — internal Docker network only.
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: pet_quotes_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pet_quotes_network
    restart: unless-stopped

# ============================================================
# Volumes
# ============================================================
volumes:
  pet_quotes_data:
    driver: local
  redis_data:
    driver: local
  pet_uploads:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  pet_quotes_network:
    driver: bridge
