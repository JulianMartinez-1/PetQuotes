global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts/prometheus-alerts.yml

scrape_configs:
  - job_name: "petquotes-api-gateway"
    metrics_path: /api/metrics/prometheus
    static_configs:
      - targets: ["api-gateway:3001"]

  - job_name: "petquotes-auth-service"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["auth-service:3002"]

  - job_name: "petquotes-appointment-service"
    metrics_path: /metrics/prometheus
    static_configs:
      - targets: ["appointment-service:3005"]
