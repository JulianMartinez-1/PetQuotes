groups:
  - name: petquotes-availability
    interval: 15s
    rules:
      - alert: PetQuotesTargetDown
        expr: up{job=~"petquotes-.*"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Target caido en {{ $labels.job }}"
          description: "Prometheus no puede scrapear {{ $labels.instance }} desde hace al menos 30s."

      - alert: PetQuotesReadyEndpointFailing
        expr: increase(petquotes_http_errors_total{endpoint=~".*/ready|/ready"}[2m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Readiness con errores en {{ $labels.service }}"
          description: "El endpoint ready reporto errores en los ultimos 2 minutos."

  - name: petquotes-reliability
    interval: 30s
    rules:
      - alert: PetQuotesHighErrorRate
        expr: |
          (
            sum by (service) (rate(petquotes_http_errors_total[5m]))
            /
            clamp_min(sum by (service) (rate(petquotes_http_requests_total[5m])), 0.001)
          ) > 0.02
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Error rate alto en {{ $labels.service }}"
          description: "La tasa de errores supera 2% en ventana de 5 minutos."

      - alert: PetQuotesGatewayProxyLatencyHigh
        expr: |
          max by (service, endpoint) (
            petquotes_http_duration_avg_ms{service="api-gateway", endpoint=~"/api/proxy/.*"}
          ) > 1200
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Latencia alta en proxy de gateway"
          description: "La latencia promedio del endpoint proxy supera 1200ms por mas de 10 minutos."

      - alert: PetQuotesDependencyErrors
        expr: |
          sum by (service) (
            increase(petquotes_http_errors_total{endpoint=~"/api/ready|/ready|/api/proxy/.*"}[5m])
          ) > 3
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Errores repetidos en dependencias"
          description: "Se detectaron errores recurrentes en readiness o proxy. Revisar Redis, DB y servicios internos."
