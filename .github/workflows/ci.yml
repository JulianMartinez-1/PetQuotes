name: pet-quotes-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Install backend deps
        run: cd backend && npm install

      - name: Install frontend deps
        run: cd frontend && npm install

      - name: Lint backend
        run: npm run lint:backend

      - name: Lint frontend
        run: npm run lint:frontend

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: https://api.petquotes.online
          NEXT_PUBLIC_API_URL: https://api.petquotes.online
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: placeholder
          NEXT_PUBLIC_API_TIMEOUT_MS: "10000"
        run: npm run build:frontend

  security-audit:
    name: Security Audit
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install root deps
        run: npm install

      - name: Run npm audit
        run: |
          mkdir -p .ci-logs
          npm audit --json > .ci-logs/npm-audit.json || true

      - name: Audit summary
        run: |
          node -e "
            const fs = require('fs');
            const raw = fs.existsSync('.ci-logs/npm-audit.json') ? fs.readFileSync('.ci-logs/npm-audit.json', 'utf8') : '{}';
            const d = JSON.parse(raw || '{}');
            const v = (d.metadata && d.metadata.vulnerabilities) || {};
            const critical = v.critical || 0;
            const high = v.high || 0;
            console.log('[SECURITY] critical=' + critical + ', high=' + high + ', moderate=' + (v.moderate||0) + ', low=' + (v.low||0));
            if (critical > 0) { console.error('[SECURITY] Blocking: critical vulnerabilities found'); process.exit(1); }
            console.log('[SECURITY] Gate passed.');
          "

      - uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: .ci-logs/npm-audit.json
          if-no-files-found: ignore
