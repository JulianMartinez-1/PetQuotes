name: Deploy — Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  build-push:
    name: Build & push frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/pet-quotes-frontend:latest
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.petquotes.online
            NEXT_PUBLIC_API_URL=https://api.petquotes.online
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_API_TIMEOUT_MS=10000
            NEXT_PUBLIC_RECAPTCHA_SITE_KEY=6LdFEzItAAAAAAOvPHztL0E9tDhwc66JbvxukrpF

  deploy:
    name: Deploy to Droplet
    needs: build-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH and redeploy frontend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: appuser
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/appuser/pet-quotes
            docker compose pull frontend
            docker compose up -d --no-deps frontend
